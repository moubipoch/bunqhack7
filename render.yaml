services:
  - type: web
    name: bunqhack7-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HUME_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: MOCK_MODE
        value: "false"
      - key: PYTHON_VERSION
        value: "3.13.0"
